site_name: ruststream-lapin
site_description: The RabbitMQ / AMQP 0.9.1 broker for RustStream - native acknowledgement, quorum queues, publisher confirms, direct reply-to, and an in-process test broker.
site_url: https://powersemmi.github.io/ruststream-lapin/
repo_url: https://github.com/powersemmi/ruststream-lapin
repo_name: powersemmi/ruststream-lapin
edit_uri: edit/main/docs/
copyright: Apache-2.0

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
      dedent_subsections: true
  - pymdownx.tabbed:
      alternate_style: true

hooks:
  - docs/hooks/snippet_titles.py

plugins:
  - search
  # Versioned docs published with `mike`

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/powersemmi/ruststream-lapin

nav:
  - Home: index.md
  - Guide:
      - queues.md
      - publishing.md
      - request-reply.md
      - testing.md
  - RustStream docs: https://powersemmi.github.io/ruststream/
  - API reference: https://docs.rs/ruststream-lapin
