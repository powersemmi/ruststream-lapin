name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  verify:
    name: Verify version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check tag matches the Cargo.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VER="${TAG#v}"

          CARGO_VERSION=$(python -c "
          import tomllib
          with open('Cargo.toml', 'rb') as f:
              print(tomllib.load(f)['workspace']['package']['version'])
          ")
          if [ "$TAG_VER" != "$CARGO_VERSION" ]; then
            echo "Tag '${TAG}' does not match Cargo.toml version '$CARGO_VERSION'"
            exit 1
          fi

          echo "Version $TAG_VER verified"

  crates-io:
    name: Publish ruststream-lapin to crates.io
    needs: verify
    runs-on: ubuntu-latest
    environment: crates.io
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io via trusted publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: cargo publish ruststream-lapin
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          # Skip publishing when this version is already on crates.io, so re-running a
          # release (or a partially-failed one) still succeeds.
          name=ruststream-lapin
          version=$(cargo metadata --format-version 1 --no-deps \
            | jq -r --arg n "$name" '.packages[] | select(.name == $n) | .version')
          index="https://index.crates.io/${name:0:2}/${name:2:2}/${name}"
          if curl -fsSL "$index" 2>/dev/null | grep -qF "\"vers\":\"${version}\""; then
            echo "$name $version already on crates.io, skipping"
          else
            cargo publish -p "$name"
          fi
